  upstream habidue_backend {
      server app-green:8080;
  }

  server {
      listen 80;
      server_name habidue.com www.habidue.com;
      return 301 https://$host$request_uri;
  }

  # 새로 추가 - www 리다이렉트
  server {
      listen 443 ssl;
      server_name www.habidue.com;
      ssl_certificate /etc/letsencrypt/live/habidue.com/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/habidue.com/privkey.pem;
      return 301 https://habidue.com$request_uri;
  }

  server {
      listen 443 ssl;
      server_name habidue.com;
      server_tokens off;
      client_max_body_size 300m;

      ssl_certificate /etc/letsencrypt/live/habidue.com/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/habidue.com/privkey.pem;

      location / {
          root /usr/share/nginx/html;
          index index.html;
          try_files $uri $uri/ /index.html;
      }

      location /api {
          proxy_pass http://habidue_backend;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_request_buffering off;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_connect_timeout 60s;
          proxy_send_timeout 300s;
          proxy_read_timeout 300s;
      }
      
      location /oauth2/authorization {
      	  proxy_pass http://habidue_backend;
      	  proxy_set_header Host $host;
      	  proxy_set_header X-Real-IP $remote_addr;
      	  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      	  proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /login {
      	  proxy_pass http://habidue_backend;
      	  proxy_set_header Host $host;
      	  proxy_set_header X-Real-IP $remote_addr;
      	  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      	  proxy_set_header X-Forwarded-Proto $scheme;
      }


      location /w/ {
          proxy_pass http://habidue_backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /uploads {
          alias /usr/share/nginx/html/uploads;
      }
  }


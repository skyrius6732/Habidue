<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f4f7f9;">
    <div style="background-color: #f4f7f9; padding: 40px 20px;">
        <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #edf2f7;">
            
            <!-- Header -->
            <div style="background-color: #3182ce; padding: 40px 20px; text-align: center;">
                <div style="color: #ffffff; font-size: 32px; font-weight: 900; letter-spacing: -1px;">HabiDue</div>
                <p style="margin: 10px 0 0 0; color: rgba(255,255,255,0.8); font-size: 14px;">당신을 위한 맞춤 주거 소식 리포트</p>
            </div>

            <!-- Content -->
            <div style="padding: 40px 30px; background-color: #ffffff;">
                <h1 style="font-size: 22px; font-weight: 800; color: #1a202c; margin: 0 0 10px 0; text-align: center;">안녕하세요, <span th:text="${username}" style="color: #3182ce;">사용자</span>님!</h1>
                <p style="color: #4a5568; margin: 0 0 40px 0; text-align: center; font-size: 15px;">이번 주 업데이트된 공고와 마감 임박 소식을 전해드립니다.</p>

                <!-- 1. 마감 임박 섹션 -->
                <div th:if="${not #lists.isEmpty(urgentNotices)}">
                    <div style="font-size: 16px; font-weight: 800; color: #e53e3e; margin: 0 0 15px 0; padding-left: 10px; border-left: 4px solid #e53e3e;">🔥 놓치지 마세요! 마감 임박 공고</div>
                    <div th:each="notice : ${urgentNotices}" style="margin-bottom: 15px;">
                        <a th:href="${notice.link}" style="border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; text-decoration: none; display: block; color: inherit; background-color: #fffaf0; border-left: 4px solid #e53e3e;">
                            <span th:text="${notice.source}" 
                                  style="font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 4px; color: #fff; margin-bottom: 10px; display: inline-block; background-color: #e53e3e;">LH</span>
                            <h3 style="font-size: 15px; font-weight: 700; color: #2d3748; margin: 0 0 8px 0;" th:text="${notice.title}">공고 제목</h3>
                            <p style="font-size: 13px; color: #718096; margin: 0;">마감일: <span style="color: #e53e3e; font-weight: 700;" th:text="${notice.deadline}">2026.03.12</span></p>
                        </a>
                    </div>
                </div>

                <!-- 2. 맞춤 신규 공고 섹션 -->
                <div th:if="${not #lists.isEmpty(newNotices)}" style="margin-top: 40px;">
                    <div style="font-size: 16px; font-weight: 800; color: #3182ce; margin: 0 0 15px 0; padding-left: 10px; border-left: 4px solid #3182ce;">✨ 매칭 키워드 신규 공고</div>
                    <div th:each="notice : ${newNotices}" style="margin-bottom: 15px;">
                        <a th:href="${notice.link}" style="border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; text-decoration: none; display: block; color: inherit; background-color: #f7fafc;">
                            <span th:text="${notice.source}" 
                                  style="font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 4px; color: #fff; margin-bottom: 10px; display: inline-block;"
                                  th:styleappend="${notice.source == 'LH' ? 'background-color: #38a169;' : (notice.source == 'SH' ? 'background-color: #3182ce;' : 'background-color: #c08457;')}">출처</span>
                            <h3 style="font-size: 15px; font-weight: 700; color: #2d3748; margin: 0 0 8px 0;" th:text="${notice.title}">공고 제목</h3>
                            <p style="font-size: 13px; color: #718096; margin: 0;">게시일: <span th:text="${notice.announcementDate}" style="font-weight: 600;">2026.03.09</span></p>
                        </a>
                    </div>
                </div>

                <!-- CTA -->
                <div style="text-align: center; margin-top: 40px;">
                    <a href="https://habidue.com/notices" style="background-color: #3182ce; color: #ffffff !important; padding: 14px 40px; border-radius: 10px; text-decoration: none; font-weight: 800; display: inline-block; font-size: 16px;">HabiDue에서 전체 공고 보기</a>
                </div>
            </div>

            <!-- Footer -->
            <div style="padding: 30px; text-align: center; font-size: 12px; color: #a0aec0; border-top: 1px solid #edf2f7; background-color: #fafafa;">
                <p style="margin: 0 0 5px 0;">본 메일은 HabiDue 알림 설정에 따라 발송되었습니다.</p>
                <p style="margin: 0 0 20px 0;">수신을 원치 않으시면 <a href="https://habidue.com/keywords" style="color: #3182ce; text-decoration: none;">마이페이지</a>에서 설정을 변경해 주세요.</p>
                <p style="margin: 0;">© 2026 HabiDue Team. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>
</html>

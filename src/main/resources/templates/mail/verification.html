<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f4f7f9;">
    <div style="background-color: #f4f7f9; padding: 40px 20px;">
        <div style="max-width: 500px; margin: 0 auto; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #edf2f7;">
            <!-- 상단 파란색 헤더 -->
            <div style="background-color: #3182ce; padding: 40px 20px; text-align: center;">
                <div style="color: #ffffff; font-size: 32px; font-weight: 900; letter-spacing: -1px;">HabiDue</div>
            </div>
            
            <!-- 본문 내용 -->
            <div style="padding: 40px 30px; text-align: center; background-color: #ffffff;">
                <h1 style="font-size: 22px; font-weight: 800; color: #1a202c; margin: 0 0 15px 0;">메일 리포트 인증 절차</h1>
                <p style="font-size: 15px; color: #4a5568; margin: 0 0 30px 0; line-height: 1.6;">
                    안녕하세요, <span th:text="${username}" style="font-weight: 700; color: #3182ce;">사용자</span>님!<br>
                    리포트 수신을 위해 아래 인증 코드를 입력해 주세요.
                </p>
                
                <!-- 인증 코드 박스 -->
                <div style="background-color: #ebf8ff; border: 2px dashed #3182ce; border-radius: 12px; padding: 25px; margin-bottom: 30px;">
                    <div style="font-size: 36px; font-weight: 900; color: #2b6cb0; letter-spacing: 8px;" th:text="${code}">123456</div>
                </div>
                
                <p style="font-size: 13px; color: #718096; margin: 0; line-height: 1.5;">
                    인증 코드는 <strong style="color: #2d3748;">10분간 유효</strong>합니다.<br>
                    본인이 요청하지 않았다면 이 메일을 무시해 주세요.
                </p>
            </div>
            
            <!-- 하단 정보 -->
            <div style="padding: 30px; text-align: center; font-size: 12px; color: #a0aec0; border-top: 1px solid #edf2f7; background-color: #fafafa;">
                <p style="margin: 0 0 10px 0;">© 2026 HabiDue Team. All rights reserved.</p>
                <p style="margin: 0;">도움이 필요하신가요? <a href="mailto:skyrius6732@gmail.com" style="color: #3182ce; text-decoration: none;">고객센터 문의</a></p>
            </div>
        </div>
    </div>
</body>
</html>

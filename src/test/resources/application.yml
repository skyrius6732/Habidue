spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      repositories:
        enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-id
            client-secret: test-secret

# 테스트용 JWT 설정 추가
jwt:
  secret: dGVzdF9zZWNyZXRfa2V5X2Zvcl91bml0X3Rlc3RpbmdfZHVtbXlfdmFsdWVfc2hvdWxkX2JlX2xvbmdfZW5vdWdo
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 1209600
